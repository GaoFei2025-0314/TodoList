<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事项</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="scene">
        <div class="app-shell">
            <header class="app-header">
                <div class="header-left">
                    <svg class="app-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M8 12.5L11 15.5L16.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1>提醒事项</h1>
                </div>
                <span class="task-count" id="task-count">
                    {% set pending = todos | rejectattr('completed') | list | length %}
                    {{ pending }} 项待办
                </span>
            </header>

            <form id="todo-form" class="input-row">
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.2"/>
                        <path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="todo-input" placeholder="添加新提醒…" autocomplete="off" required>
                </div>
            </form>

            <div class="list-container" id="todo-list">
                {% for todo in todos %}
                <div class="todo-item{% if todo.completed %} is-done{% endif %}" data-id="{{ todo.id }}" style="animation-delay: {{ loop.index0 * 40 }}ms">
                    <label class="check-label">
                        <input type="checkbox" class="sr-only" {% if todo.completed %}checked{% endif %}>
                        <span class="check-circle">
                            <svg viewBox="0 0 12 12" fill="none">
                                <path d="M2.5 6.5L5 9L9.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </label>
                    <span class="todo-text">{{ todo.title }}</span>
                    <button class="delete-btn" aria-label="删除">
                        <svg viewBox="0 0 16 16" fill="none">
                            <path d="M4.5 4.5l7 7M11.5 4.5l-7 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                {% endfor %}
            </div>

            <div class="empty-state" id="empty-state" {% if todos %}style="display:none"{% endif %}>
                <svg viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1"/>
                    <path d="M16 24.5L22 30.5L33 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <p>没有待办事项</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        function updateCount() {
            const pending = $('.todo-item:not(.is-done)').length;
            $('#task-count').text(pending + ' 项待办');
            if ($('.todo-item').length === 0) {
                $('#empty-state').fadeIn(300);
            } else {
                $('#empty-state').fadeOut(200);
            }
        }

        $(document).ready(function() {
            $('#todo-form').on('submit', function(e) {
                e.preventDefault();
                const title = $('#todo-input').val().trim();
                if (!title) return;

                $.ajax({
                    url: '/api/todos',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ title: title }),
                    success: function(data) {
                        const el = $(`
                            <div class="todo-item slide-in" data-id="${data.id}">
                                <label class="check-label">
                                    <input type="checkbox" class="sr-only">
                                    <span class="check-circle">
                                        <svg viewBox="0 0 12 12" fill="none">
                                            <path d="M2.5 6.5L5 9L9.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </span>
                                </label>
                                <span class="todo-text">${data.title}</span>
                                <button class="delete-btn" aria-label="删除">
                                    <svg viewBox="0 0 16 16" fill="none">
                                        <path d="M4.5 4.5l7 7M11.5 4.5l-7 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        `);
                        $('#todo-list').prepend(el);
                        $('#todo-input').val('').focus();
                        updateCount();
                    }
                });
            });

            $(document).on('change', '.todo-item input[type="checkbox"]', function() {
                const $item = $(this).closest('.todo-item');
                const todoId = $item.data('id');
                const completed = $(this).is(':checked');

                $item.toggleClass('is-done', completed);
                updateCount();

                $.ajax({
                    url: '/api/todos/' + todoId,
                    method: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({ completed: completed })
                });
            });

            $(document).on('click', '.delete-btn', function() {
                const $item = $(this).closest('.todo-item');
                const todoId = $item.data('id');

                $item.addClass('slide-out');
                setTimeout(function() {
                    $item.remove();
                    updateCount();
                }, 280);

                $.ajax({
                    url: '/api/todos/' + todoId,
                    method: 'DELETE'
                });
            });
        });
    </script>
</body>
</html>
